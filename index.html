<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Site Ficha de Inscrição</title>
</head>

<body>

<center>
<h2>Ficha De Inscrição</h2>
</center>

<form>

<table border="1" align="center" cellpadding="8">

<tr>
<td>Nome do candidato:</td>
<td colspan="4">
<input type="text" name="nome" size="60">
</td>
</tr>

<tr>
<td>Endereço:</td>
<td colspan="4">
<input type="text" name="endereco" size="60">
</td>
</tr>

<tr>
<td>CEP:</td>
<td><input type="text" name="cep"></td>

<td>Cidade:</td>
<td>
<select name="cidade">
<option>-- CIDADE --</option>
<option>Brasília</option>
<option>São Paulo</option>
<option>Rio de Janeiro</option>
</select>
</td>

<td>
<select name="uf">
<option>-- UF --</option>
<option>DF</option>
<option>SP</option>
<option>RJ</option>
<option>MG</option>
</select>
</td>
</tr>

<tr>
<td>Telefone:</td>
<td><input type="text" name="ddd" size="3"></td>
<td><input type="text" name="telefone1"></td>
<td><input type="text" name="telefone2"></td>
<td></td>
</tr>

<tr>
<td>RG:</td>
<td><input type="text" name="rg"></td>

<td>CPF:</td>
<td><input type="text" name="cpf"></td>

<td>
Sexo:
<input type="radio" name="sexo" value="mas"> Mas.
<input type="radio" name="sexo" value="fem"> Fem.
</td>
</tr>

<tr>
<td>Escolaridade:</td>
<td>
<select name="escolaridade">
<option>-- Selecione --</option>
<option>Ensino Médio</option>
<option>Ensino Superior</option>
<option>Pós Graduação</option>
</select>
</td>

<td>Email:</td>
<td colspan="2">
<input type="email" name="email" size="30">
</td>
</tr>

<tr>
<td>Curso:</td>
<td>
<select name="curso">
<option>-- Selecione --</option>
<option>Informática</option>
<option>Administração</option>
<option>Engenharia</option>
</select>
</td>

<td>Senha de acompanhamento:</td>
<td colspan="2">
<input type="password" name="senha">
</td>
</tr>

<tr>
<td colspan="5" align="center">
<input type="submit" value="CADASTRAR">
</td>
</tr>

</table>

</form>

</body>
</html>
